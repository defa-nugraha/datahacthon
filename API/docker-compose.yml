services:
  zone-inference-api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: zone-inference-api
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      PROJECT_ROOT: /app
      API_TITLE: Zone-Based Vegetation Recommendation API
      API_VERSION: 1.0.0
      LOG_LEVEL: INFO
      ACTIVE_ZONE_SCENARIO: zone_mean_plus_variability
      ZONE_MODEL_PATH: artifacts/models/best_zone_model_expanded.joblib
      ZONE_PREPROCESSING_PATH: artifacts/pipelines/best_zone_pipeline_expanded.joblib
      ZONE_METRICS_PATH: artifacts/best_model_metrics_expanded.json
      ZONE_METADATA_PATH: data/processed/zone_dataset_expanded_id_metadata.json
      ZONE_FEATURE_SUMMARY_PATH: artifacts/zone_feature_summary_expanded.csv
      ZONE_INFERENCE_ABSOLUTE_MIN_SAMPLES: 3
      ZONE_INFERENCE_RECOMMENDED_MIN_SAMPLES: 8
      ALLOW_PREDICTION_BELOW_RECOMMENDED_MIN_SAMPLES: "true"
      DEFAULT_TOP_K: 3
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=3)"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
