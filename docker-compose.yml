services:
  app:
    build:
      context: .
      dockerfile: .docker/php/Dockerfile
      args:
        PHP_VERSION: ${PHP_VERSION:-8.4}
        NODE_MAJOR: ${NODE_MAJOR:-22}
        COMPOSER_VERSION: ${COMPOSER_VERSION:-2.8}
    image: datahacthon-interface-app:dev
    working_dir: /var/www/html
    environment:
      APP_ENV: ${APP_ENV:-local}
      APP_DEBUG: ${APP_DEBUG:-true}
      DB_CONNECTION: ${DB_CONNECTION:-sqlite}
      DB_DATABASE: ${DB_DATABASE:-/var/www/html/database/database.sqlite}
      AI_ADVISOR_BASE_URL: ${AI_ADVISOR_BASE_URL:-http://ai:8001}
      AI_ADVISOR_TIMEOUT: ${AI_ADVISOR_TIMEOUT:-20}
    volumes:
      - ./:/var/www/html
      - vendor_data:/var/www/html/vendor
      - node_modules_data:/var/www/html/node_modules
    healthcheck:
      test: ["CMD", "php-fpm", "-t"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  web:
    image: nginx:${NGINX_VERSION:-1.27-alpine}
    depends_on:
      - app
    ports:
      - "${APP_PORT:-8080}:80"
    volumes:
      - ./:/var/www/html:ro
      - vendor_data:/var/www/html/vendor:ro
      - ./.docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro

  ai:
    build:
      context: .
      dockerfile: python_service/Dockerfile
    image: datahacthon-interface-ai:dev
    environment:
      VERTEX_AI_ENABLED: ${VERTEX_AI_ENABLED:-false}
      GOOGLE_CLOUD_PROJECT: ${GOOGLE_CLOUD_PROJECT:-}
      GOOGLE_CLOUD_LOCATION: ${GOOGLE_CLOUD_LOCATION:-global}
      VERTEX_MODEL: ${VERTEX_MODEL:-gemini-2.5-flash}
      VERTEX_API_KEY: ${VERTEX_API_KEY:-}
    ports:
      - "${AI_SERVICE_PORT:-8001}:8001"

  vite:
    image: datahacthon-interface-app:dev
    depends_on:
      - app
    working_dir: /var/www/html
    environment:
      SKIP_APP_BOOTSTRAP: "1"
      APP_ENV: ${APP_ENV:-local}
      APP_DEBUG: ${APP_DEBUG:-true}
      DB_CONNECTION: ${DB_CONNECTION:-sqlite}
      DB_DATABASE: ${DB_DATABASE:-/var/www/html/database/database.sqlite}
    command: >
      sh -lc "if [ ! -d node_modules ] || [ -z \"$(ls -A node_modules 2>/dev/null)\" ]; then npm install; fi &&
      npm run dev -- --host 0.0.0.0 --port ${VITE_PORT:-5173}"
    ports:
      - "${VITE_PORT:-5173}:5173"
    volumes:
      - ./:/var/www/html
      - vendor_data:/var/www/html/vendor
      - node_modules_data:/var/www/html/node_modules

  queue:
    image: datahacthon-interface-app:dev
    depends_on:
      - app
    profiles: ["workers"]
    working_dir: /var/www/html
    environment:
      SKIP_APP_BOOTSTRAP: "1"
      APP_ENV: ${APP_ENV:-local}
      APP_DEBUG: ${APP_DEBUG:-true}
      DB_CONNECTION: ${DB_CONNECTION:-sqlite}
      DB_DATABASE: ${DB_DATABASE:-/var/www/html/database/database.sqlite}
    command: php artisan queue:listen --tries=1 --timeout=0
    volumes:
      - ./:/var/www/html
      - vendor_data:/var/www/html/vendor

  scheduler:
    image: datahacthon-interface-app:dev
    depends_on:
      - app
      - ai
    profiles: ["workers"]
    working_dir: /var/www/html
    environment:
      SKIP_APP_BOOTSTRAP: "1"
      APP_ENV: ${APP_ENV:-local}
      APP_DEBUG: ${APP_DEBUG:-true}
      DB_CONNECTION: ${DB_CONNECTION:-sqlite}
      DB_DATABASE: ${DB_DATABASE:-/var/www/html/database/database.sqlite}
      AI_ADVISOR_BASE_URL: ${AI_ADVISOR_BASE_URL:-http://ai:8001}
      AI_ADVISOR_TIMEOUT: ${AI_ADVISOR_TIMEOUT:-20}
    command: php artisan schedule:work
    volumes:
      - ./:/var/www/html
      - vendor_data:/var/www/html/vendor

volumes:
  vendor_data:
  node_modules_data:
